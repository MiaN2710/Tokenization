baseURL: 'https://kinethic.ai/'
title: KINETHIC
languageCode: en-us
theme: tailbliss
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
pagination:
  pagerSize: 9
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: 
  authorimage: 
  og_image: 
  moto: "Intelligence begins with Ethical\u00a0Motion"
  description: "Kinethic embeds provenance, royalties, and compliance into motion data turning movement into an ethical core of tomorrow’s AI."
  disable_theme_toggle: false
  newsletter_signup: true


 



  p1:
    heading: "What, Why, How ?"
    # image: "images/homepage/dancer.png"
    content:
      - text: "Every movement is knowledge. Every gesture is labor."
      - text: "Yet today, motion data captured across gaming, robotics, film, and health is extracted, anonymized, and monetized without consent or royalties. Kinethic exists to change this. We build the tools and frameworks that turn movement into an ethical, traceable, and revenue-bearing asset. Through blockchain tokenization, smart contracts, and AI model research, we ensure that performers retain authorship and share in the value their motion generates."
      - text: "Read more about Motion Research →"

  pimage1:
    image: "/images/homepage/longwidth2.png"


  p2:
    heading: "Markets - for whom?"
    
    content:
      - text: "From indie game developers to robotics labs, fitness and health tech, and cultural heritage institutions, Kinethic connects the diverse fields that work with human motion."
      - link: "Read more about Market →"
 
  p3:
    heading: "Current Research: Blockchain/Tokenization"
    # image: "../assets/images/Post1/dancer_landscape.png"
    content:
      - text: "We are developing a tokenization software protocol that links performer motion to blockchain identifiers. Each dataset becomes a smart asset: secured, traceable, and royalty-enabled across industries."
      - link: "Learn more about Tokenization 🡪"
    
  p4:
    heading: "AI Model Research Concept"
    # image: "../assets/images/Post1/dancer_landscape.png"
    content:
      - text: "Our long-term vision is an ethical motion AI model, trained only on consented, provenance-secured datasets. It will classify, predict, and generate movement while embedding attribution and royalties at its core."
      - link: "Read more about the AI Model 🡪"

  p5:
    heading: "Ethical Motion Archive"
    # image: "../assets/images/Post1/dancer_landscape.png"
    content:
      - text: "We are building an Ethical Motion Archive, a living repository for motion data governed by transparency, performer consent, and fair redistribution of value."
      - link: "Explore the Archive 🡪"

  p6:
    heading: "Ongoing Ethics Research"
    # image: "../assets/images/Post1/dancer_landscape.png"
    content:
      - text: "Kinethic collaborates with scholars, artists, and professionals to define ethical frameworks for motion data, choreography, and AI, aligning with the EU AI Act and global creative-tech policy."
      - link: "Read more about Ethics Research 🡪"
      


  PS:
    heading: "Backed by world-renowned investors"
    content:
      - text: "Sagittis scelerisque nulla cursus in enim consectetur quam. Dictum urna sed consectetur neque tristique pellentesque. Blandit amet, sed aenean erat arcu morbi. Cursus faucibus nunc nisl netus morbi vel porttitor vitae ut. Amet vitae fames senectus vitae."
    links:
      - text: Meet our investors and advisors
        url: "#"
    logos:
      - identifier: a
        image: "images/global/sample-logo.svg"
        alt: "a"
      - identifier: b
      - identifier: c
      - identifier: d
      - identifier: e
      - identifier: f

  
  pblog:
    heading: "Our publications"
    content:
      - text: "Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ipsa libero labore natus atque, ducimus sed."

